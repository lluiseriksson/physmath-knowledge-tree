name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web · Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install locked project metadata
        run: npm ci

      - name: Run complete web quality gate
        run: npm run check

  lean:
    name: Lean · mathlib
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build and check Lean package
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          test: false
          lint: false
          mk_all-check: true
          build-args: --wfail
          use-mathlib-cache: true
          # Bundled leanchecker is useful as a manual/heavy check, but GitHub
          # hosted runners repeatedly cancelled it after successful curation-only
          # builds. Keep push CI focused on deterministic Lake checks.
          leanchecker: false
