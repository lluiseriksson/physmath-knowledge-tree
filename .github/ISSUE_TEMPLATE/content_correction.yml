name: Knowledge or content correction
description: Correct the research graph, learning map, translation, taxonomy, estimate, or prerequisite edge.
title: '[Content]: '
labels: [content, triage]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Affected layer
      options:
        - Research graph (graph/)
        - Learning map (src/data/)
        - Lean metadata or formalization
        - Documentation or prompt
        - Translation
        - Multiple layers
    validations:
      required: true
  - type: input
    id: identifier
    attributes:
      label: Stable ID, declaration, or page
      description: Use a dotted graph ID, learning topic ID, Lean declaration, or repository path when possible.
      placeholder: problem.riemann_hypothesis
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Type of correction
      options:
        - Scientific or mathematical accuracy
        - Research-graph edge or confidence
        - Learning prerequisite relationship
        - Lean import or declaration
        - English wording
        - Spanish wording
        - Classification, level, or estimate
        - Missing node, topic, or source
        - Other
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current problem
      description: State exactly what is inaccurate, unclear, untraceable, or incomplete.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Proposed correction
      description: Include confidence, mechanism, falsifier, and both language variants when those fields apply.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Supporting sources
      description: Cite primary literature, an authoritative textbook, official Lean/mathlib documentation, or another reviewable source.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I read the relevant content or graph guide.
          required: true
        - label: I searched existing issues for a duplicate.
          required: true
        - label: I am not presenting a heuristic or speculative claim as established fact.
          required: true
