name: Feature request
description: Propose a research, learner, maintainer, accessibility, or engineering improvement.
title: '[Feature]: '
labels: [enhancement, triage]
body:
  - type: dropdown
    id: audience
    attributes:
      label: Primary audience
      options:
        - Research-graph explorer
        - Learner
        - Lean formalizer
        - Graph/content maintainer
        - Contributor or reviewer
        - Multiple audiences
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user or maintainer need, not only the proposed interface.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Explain how the feature would work, which canonical files it affects, and what would remain unchanged.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and trade-offs
      description: Include rigor, accessibility, privacy, offline use, dependencies, performance, and maintenance when relevant.
  - type: checkboxes
    id: principles
    attributes:
      label: Project principles
      options:
        - label: The proposal preserves uncertainty labels and traceable mechanisms for research claims.
        - label: The proposal can preserve a usable keyboard and list-view experience.
        - label: The proposal does not require tracking or mandatory accounts.
        - label: I searched existing issues for related proposals.
          required: true
